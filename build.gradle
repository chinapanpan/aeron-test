plugins {
    id 'java'
    id 'application'
}

group = 'com.example.aeron'
version = '1.0.0'
sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'io.aeron:aeron-all:1.48.0'
    implementation 'org.agrona:agrona:2.2.1'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.example.aeron.cluster.ClusterNode'
    }
}

task fatJar(type: Jar) {
    archiveBaseName = 'aeron-cluster-demo'
    archiveClassifier = 'all'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from { configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
    with jar
}

task clientJar(type: Jar) {
    archiveBaseName = 'aeron-cluster-client'
    archiveClassifier = 'all'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': 'com.example.aeron.client.ClusterClient'
    }
    from { configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
    with jar
}

build.dependsOn fatJar
build.dependsOn clientJar
